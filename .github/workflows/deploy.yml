name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 5.161.46.138 >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='terraform' \
            --exclude='.claude' \
            --exclude='.idea' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@5.161.46.138:/opt/hvac-boc/

      - name: Rebuild and restart container
        run: |
          ssh -i ~/.ssh/deploy_key root@5.161.46.138 \
            "cd /opt/hvac-boc && docker compose build --pull && docker compose up -d --remove-orphans"
